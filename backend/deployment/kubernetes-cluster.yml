---
# 🔧 SERVICE MESH CONFIGURATION
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: mosa-forge-virtual-service
  namespace: mosa-forge-production
spec:
  hosts:
  - "api.mosaforge.com"
  gateways:
  - mosa-forge-gateway
  http:
  - match:
    - uri:
        prefix: "/api/v1/auth"
    route:
    - destination:
        host: auth-service
        port:
          number: 3002
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 2s
  - match:
    - uri:
        prefix: "/api/v1/payments"
    route:
    - destination:
        host: payment-service
        port:
          number: 3003
    timeout: 60s
  - match:
    - uri:
        prefix: "/api/v1/students"
    route:
    - destination:
        host: student-service
        port:
          number: 3004

---
# 🗄️ STORAGE CLASSES
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: kubernetes.io/aws-ebs
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer

---
# 🔐 NETWORK POLICIES
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: mosa-forge-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-communication
  namespace: mosa-forge-production
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgresql
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

---
# 📈 VERTICAL POD AUTOSCALER
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-gateway-vpa
  namespace: mosa-forge-production
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: api-gateway
  updatePolicy:
    updateMode: "Auto"

---
# 🎯 CLUSTER AUTOSCALER
apiVersion: autoscaling.k8s.io/v1
kind: ClusterAutoscaler
metadata:
  name: cluster-autoscaler
  namespace: kube-system
spec:
  scaleDownDelayAfterAdd: "10m"
  scaleDownUnneededTime: "5m"
  scaleDownUtilizationThreshold: "0.5"
  maxNodeProvisionTime: "15m"
  resourceLimits:
    maxNodes: 50
    minNodes: 3
    cores:
      min: 16
      max: 200
    memory:
      min: 64
      max: 800

---
# 🔔 ALERT MANAGER
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: mosa-forge-alertmanager
  namespace: mosa-forge-production
spec:
  replicas: 2
  resources:
    requests:
      memory: 400Mi
    limits:
      memory: 600Mi
  alertmanagerConfigSelector:
    matchLabels:
      alertmanager: mosa-forge

---
# 💾 BACKUP CONFIGURATION
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-backup
  namespace: mosa-forge-production
spec:
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
    - mosa-forge-production
    excludedResources:
    - nodes
    - events
    - events.events.k8s.io
    - backups.velero.io
    - restores.velero.io
    ttl: 720h0m0s

---
# 🏷️ FINAL CLUSTER LABELS
apiVersion: meta.k8s.io/v1
kind: Table
metadata:
  name: cluster-info
  labels:
    platform: mosa-forge
    environment: production
    region: ethiopia-east
    compliance: ethiopian-data
    powered-by: chereka
    founder: oumer-muktar
    version: enterprise-1.0.0
    deployment-date: "2024-10-01"
    sla: "99.9%"
    support-tier: enterprise-24x7