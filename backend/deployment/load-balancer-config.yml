# 🎯 MOSA FORGE: Enterprise Load Balancer Configuration
#
# @file: load-balancer-config.yml
# @description: Production-grade load balancing configuration for Mosa Forge microservices
# @version: 1.0.0
# @author: Oumer Muktar | Powered by Chereka
#
# 🏗️ ENTERPRISE FEATURES:
# - Zero-downtime deployments
# - Intelligent traffic routing
# - Health-based load distribution
# - DDoS protection and rate limiting
# - SSL/TLS termination with Ethiopian CA compliance

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-loadbalancer-config
  namespace: mosa-forge-production
  labels:
    app: mosa-forge-lb
    version: "1.0.0"
    environment: production
data:
  # 🏗️ MAIN NGINX CONFIGURATION
  nginx.conf: |
    # 🎯 Enterprise Core Configuration
    user nginx;
    worker_processes auto;
    worker_rlimit_nofile 65536;
    
    # 🛡️ Security & Performance Tuning
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
        worker_connections 16384;
        use epoll;
        multi_accept on;
        accept_mutex_delay 100ms;
    }
    
    http {
        # 🏗️ Basic Settings
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        # 📊 Performance Optimizations
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        keepalive_requests 1000;
        types_hash_max_size 2048;
        server_tokens off;
        
        # 🛡️ Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # 🌍 Ethiopian Localization
        charset utf-8;
        
        # 📈 Logging Configuration
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';
        
        access_log /var/log/nginx/access.log main buffer=512k flush=1m;
        
        # 💰 Rate Limiting for Payment Protection
        limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=100r/m;
        limit_req_zone $binary_remote_addr zone=auth_rate_limit:10m rate=50r/m;
        limit_req_zone $binary_remote_addr zone=payment_rate_limit:10m rate=30r/m;
        
        # 🔐 SSL Configuration - Ethiopian CA Compliance
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # 🚀 Upstream Services Configuration
        upstream api_gateway_backend {
            zone api_gateway 64k;
            least_conn;
            
            # 🎯 Production API Gateway Instances
            server api-gateway-1.mosa-forge-production.svc.cluster.local:3000 max_fails=3 fail_timeout=30s;
            server api-gateway-2.mosa-forge-production.svc.cluster.local:3000 max_fails=3 fail_timeout=30s;
            server api-gateway-3.mosa-forge-production.svc.cluster.local:3000 max_fails=3 fail_timeout=30s;
            
            # 🏗️ Health Check Configuration
            keepalive 32;
        }
        
        upstream auth_service_backend {
            zone auth_service 64k;
            ip_hash;
            
            # 🔐 Authentication Service Instances
            server auth-service-1.mosa-forge-production.svc.cluster.local:3001 max_fails=3 fail_timeout=30s;
            server auth-service-2.mosa-forge-production.svc.cluster.local:3001 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        upstream payment_service_backend {
            zone payment_service 64k;
            least_conn;
            
            # 💰 Payment Service Instances (High Availability)
            server payment-service-1.mosa-forge-production.svc.cluster.local:3002 max_fails=2 fail_timeout=15s;
            server payment-service-2.mosa-forge-production.svc.cluster.local:3002 max_fails=2 fail_timeout=15s;
            server payment-service-3.mosa-forge-production.svc.cluster.local:3002 max_fails=2 fail_timeout=15s;
            
            keepalive 16;
        }
        
        upstream expert_service_backend {
            zone expert_service 64k;
            least_conn;
            
            # 👨‍🏫 Expert Service Instances
            server expert-service-1.mosa-forge-production.svc.cluster.local:3003 max_fails=3 fail_timeout=30s;
            server expert-service-2.mosa-forge-production.svc.cluster.local:3003 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        upstream student_service_backend {
            zone student_service 64k;
            least_conn;
            
            # 🎓 Student Service Instances
            server student-service-1.mosa-forge-production.svc.cluster.local:3004 max_fails=3 fail_timeout=30s;
            server student-service-2.mosa-forge-production.svc.cluster.local:3004 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        upstream quality_service_backend {
            zone quality_service 64k;
            least_conn;
            
            # 🛡️ Quality Service Instances
            server quality-service-1.mosa-forge-production.svc.cluster.local:3005 max_fails=3 fail_timeout=30s;
            server quality-service-2.mosa-forge-production.svc.cluster.local:3005 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        upstream learning_service_backend {
            zone learning_service 64k;
            least_conn;
            
            # 📚 Learning Service Instances
            server learning-service-1.mosa-forge-production.svc.cluster.local:3006 max_fails=3 fail_timeout=30s;
            server learning-service-2.mosa-forge-production.svc.cluster.local:3006 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        upstream training_service_backend {
            zone training_service 64k;
            least_conn;
            
            # 🏋️ Training Service Instances
            server training-service-1.mosa-forge-production.svc.cluster.local:3007 max_fails=3 fail_timeout=30s;
            server training-service-2.mosa-forge-production.svc.cluster.local:3007 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        upstream certification_service_backend {
            zone certification_service 64k;
            least_conn;
            
            # 🏆 Certification Service Instances
            server certification-service-1.mosa-forge-production.svc.cluster.local:3008 max_fails=3 fail_timeout=30s;
            server certification-service-2.mosa-forge-production.svc.cluster.local:3008 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        upstream analytics_service_backend {
            zone analytics_service 64k;
            least_conn;
            
            # 📊 Analytics Service Instances
            server analytics-service-1.mosa-forge-production.svc.cluster.local:3009 max_fails=3 fail_timeout=30s;
            server analytics-service-2.mosa-forge-production.svc.cluster.local:3009 max_fails=3 fail_timeout=30s;
            
            keepalive 16;
        }
        
        # 🎯 MAIN SERVER BLOCKS
        
        # 🔐 HTTPS Main Server - Primary Entry Point
        server {
            listen 443 ssl http2;
            listen [::]:443 ssl http2;
            server_name api.mosaforge.com lb.mosaforge.com;
            
            # 🛡️ SSL Certificates - Ethiopian CA
            ssl_certificate /etc/nginx/ssl/mosaforge.com.crt;
            ssl_certificate_key /etc/nginx/ssl/mosaforge.com.key;
            ssl_trusted_certificate /etc/nginx/ssl/ethiopian-ca-bundle.crt;
            
            # 📍 Ethiopian Root CA Verification
            ssl_verify_client optional_no_ca;
            
            # 🚀 Global API Rate Limiting
            limit_req zone=api_rate_limit burst=200 nodelay;
            
            # 🏗️ Health Check Endpoint
            location /health {
                access_log off;
                default_type application/json;
                return 200 '{"status":"healthy","service":"load-balancer","timestamp":"$time_iso8601"}';
            }
            
            # 🎯 API Gateway Routing
            location /api/ {
                proxy_pass http://api_gateway_backend;
                
                # 🛡️ Security Headers
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # ⚡ Performance Optimizations
                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
                proxy_buffering on;
                proxy_buffer_size 4k;
                proxy_buffers 8 4k;
                
                # 🔄 Retry Logic
                proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
                proxy_next_upstream_tries 3;
                proxy_next_upstream_timeout 30s;
                
                # 📊 Monitoring Headers
                proxy_set_header X-Request-Start "${msec}";
                proxy_set_header X-Correlation-ID $request_id;
            }
            
            # 🔐 Authentication Service Routing
            location /api/auth/ {
                limit_req zone=auth_rate_limit burst=100 nodelay;
                
                proxy_pass http://auth_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                proxy_set_header X-API-Version "1.0";
                
                # 🔒 Enhanced Security for Auth Endpoints
                proxy_connect_timeout 15s;
                proxy_send_timeout 15s;
                proxy_read_timeout 15s;
            }
            
            # 💰 Payment Service Routing
            location /api/payments/ {
                limit_req zone=payment_rate_limit burst=50 nodelay;
                
                proxy_pass http://payment_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 💸 Payment-Specific Timeouts
                proxy_connect_timeout 10s;
                proxy_send_timeout 10s;
                proxy_read_timeout 30s; # Longer for payment processing
                
                # 🛡️ Payment Security Headers
                add_header X-Payment-Gateway "Telebirr-CBE-Secure" always;
                add_header X-Financial-Data "Protected" always;
            }
            
            # 👨‍🏫 Expert Service Routing
            location /api/experts/ {
                proxy_pass http://expert_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 🎯 Quality-Based Routing Headers
                proxy_set_header X-Quality-Threshold "4.0";
                proxy_set_header X-Tier-Preference "master,senior,standard";
            }
            
            # 🎓 Student Service Routing
            location /api/students/ {
                proxy_pass http://student_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 📚 Learning Progress Headers
                proxy_set_header X-Progress-Tracking "enabled";
                proxy_set_header X-Mindset-Phase "active";
            }
            
            # 🛡️ Quality Service Routing
            location /api/quality/ {
                proxy_pass http://quality_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 📊 Quality Metrics Headers
                proxy_set_header X-Quality-Metrics "real-time";
                proxy_set_header X-Enforcement-Level "auto";
            }
            
            # 📚 Learning Service Routing
            location /api/learning/ {
                proxy_pass http://learning_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 🎮 Learning Engine Headers
                proxy_set_header X-Learning-Mode "duolingo-interactive";
                proxy_set_header X-Exercise-Type "decision-scenarios";
            }
            
            # 🏋️ Training Service Routing
            location /api/training/ {
                proxy_pass http://training_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 👥 Session Management Headers
                proxy_set_header X-Session-Capacity "5-students";
                proxy_set_header X-Hands-On-Mode "active";
            }
            
            # 🏆 Certification Service Routing
            location /api/certification/ {
                proxy_pass http://certification_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 📜 Yachi Integration Headers
                proxy_set_header X-Yachi-Integration "enabled";
                proxy_set_header X-Certification-Level "enterprise";
            }
            
            # 📊 Analytics Service Routing
            location /api/analytics/ {
                proxy_pass http://analytics_service_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 📈 Business Intelligence Headers
                proxy_set_header X-Analytics-Type "business-intelligence";
                proxy_set_header X-Data-Resolution "realtime";
            }
            
            # 🚀 Static Assets - CDN Fallback
            location /static/ {
                proxy_pass http://api_gateway_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # 📁 Cache Static Assets
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header X-Static-Asset "cached";
            }
            
            # 🎯 WebSocket Support for Real-time Features
            location /ws/ {
                proxy_pass http://api_gateway_backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                
                # ⚡ WebSocket Timeouts
                proxy_connect_timeout 7d;
                proxy_send_timeout 7d;
                proxy_read_timeout 7d;
            }
            
            # 🔍 Monitoring and Metrics
            location /nginx_status {
                stub_status on;
                access_log off;
                allow 10.0.0.0/8;  # Internal network only
                allow 172.16.0.0/12;
                allow 192.168.0.0/16;
                deny all;
            }
            
            # ❌ Global Error Pages
            error_page 500 502 503 504 /50x.html;
            location = /50x.html {
                root /usr/share/nginx/html;
                internal;
            }
        }
        
        # 🔄 HTTP to HTTPS Redirect
        server {
            listen 80;
            listen [::]:80;
            server_name api.mosaforge.com lb.mosaforge.com;
            
            # 🛡️ Security Headers for HTTP
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            
            # 📍 Redirect all HTTP traffic to HTTPS
            return 301 https://$server_name$request_uri;
        }
        
        # 🌍 Regional Routing - Ethiopian Traffic Optimization
        server {
            listen 443 ssl http2;
            server_name et.api.mosaforge.com;
            
            ssl_certificate /etc/nginx/ssl/mosaforge.com.crt;
            ssl_certificate_key /etc/nginx/ssl/mosaforge.com.key;
            
            # 🎯 Ethiopian Regional Optimization
            location /api/ {
                proxy_pass http://api_gateway_backend;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $host;
                proxy_set_header X-Region "ethiopia";
                proxy_set_header X-Latency-Optimized "true";
                
                # ⚡ Reduced Timeouts for Local Traffic
                proxy_connect_timeout 5s;
                proxy_send_timeout 10s;
                proxy_read_timeout 15s;
            }
        }
    }
---
# 🏗️ LOAD BALANCER DEPLOYMENT CONFIGURATION
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-load-balancer
  namespace: mosa-forge-production
  labels:
    app: nginx-lb
    tier: load-balancer
    version: "1.0.0"
spec:
  replicas: 3  # 🎯 High Availability
  selector:
    matchLabels:
      app: nginx-lb
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # 🚀 Zero Downtime Deployments
  template:
    metadata:
      labels:
        app: nginx-lb
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      # 🛡️ Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: nginx-lb
        image: nginx:1.24-alpine  # 🐳 Alpine for security
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          protocol: TCP
        - name: metrics
          containerPort: 9113
          protocol: TCP
        # 🛡️ Security Hardening
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: ssl-certs
          mountPath: /etc/nginx/ssl
          readOnly: true
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
        # 📊 Health Checks
        livenessProbe:
          httpGet:
            path: /health
            port: 80
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
        # 🎯 Environment Variables
        env:
        - name: NGINX_WORKER_PROCESSES
          value: "auto"
        - name: NGINX_WORKER_CONNECTIONS
          value: "16384"
        - name: ENVIRONMENT
          value: "production"
      # 🛡️ SSL Certificates Volume
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-loadbalancer-config
          items:
          - key: nginx.conf
            path: nginx.conf
      - name: ssl-certs
        secret:
          secretName: mosaforge-ssl-certs
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}
      # 🎯 Node Affinity for Performance
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                - et-addis-ababa-1
                - et-addis-ababa-2
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: nginx-lb
              topologyKey: kubernetes.io/hostname
---
# 🌐 LOAD BALANCER SERVICE CONFIGURATION
apiVersion: v1
kind: Service
metadata:
  name: nginx-loadbalancer-service
  namespace: mosa-forge-production
  labels:
    app: nginx-lb
    service: load-balancer
  annotations:
    # 🎯 Cloud Provider Specific Annotations
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # 📊 Monitoring Annotations
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"
spec:
  selector:
    app: nginx-lb
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
  - name: metrics
    port: 9113
    targetPort: 9113
    protocol: TCP
  # 🎯 Session Affinity for Payment Processing
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
  # 🚀 Load Balancer IP Allocation
  loadBalancerIP: 196.188.0.100  # 🎯 Ethiopian IP Range
  externalTrafficPolicy: Local  # 📍 Preserve client IP
---
# 📊 NGINX METRICS EXPORTER
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-metrics-exporter
  namespace: mosa-forge-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-metrics-exporter
  template:
    metadata:
      labels:
        app: nginx-metrics-exporter
    spec:
      containers:
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:0.11.0
        args:
          - '-nginx.scrape-uri=http://nginx-loadbalancer-service:80/nginx_status'
        ports:
        - containerPort: 9113
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
# 🎯 CONFIGURATION FOR 10,000+ CONCURRENT USERS
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-performance-tuning
  namespace: mosa-forge-production
data:
  performance.conf: |
    # 🚀 High-Performance Tuning for 10k+ Concurrent Users
    
    # 🎯 Connection Handling
    events {
        worker_connections 16384;
        use epoll;
        multi_accept on;
        accept_mutex on;
        accept_mutex_delay 100ms;
    }
    
    # ⚡ HTTP Performance
    http {
        # 🎯 Buffer Optimizations
        client_body_buffer_size 16K;
        client_header_buffer_size 1k;
        client_max_body_size 8m;
        large_client_header_buffers 4 8k;
        
        # ⚡ Timeout Optimizations
        client_body_timeout 12;
        client_header_timeout 12;
        send_timeout 10;
        
        # 🔄 Keepalive Optimizations
        keepalive_timeout 65;
        keepalive_requests 1000;
        
        # 📈 Gzip Compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            application/atom+xml
            application/javascript
            application/json
            application/ld+json
            application/manifest+json
            application/rss+xml
            application/vnd.geo+json
            application/vnd.ms-fontobject
            application/x-font-ttf
            application/x-web-app-manifest+json
            application/xhtml+xml
            application/xml
            font/opentype
            image/bmp
            image/svg+xml
            image/x-icon
            text/cache-manifest
            text/css
            text/plain
            text/vcard
            text/vnd.rim.location.xloc
            text/vtt
            text/x-component
            text/x-cross-domain-policy;
        
        # 🛡️ Rate Limiting for DDoS Protection
        limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
        limit_req_zone $binary_remote_addr zone=api:10m rate=1000r/m;
        
        # 🔍 DNS Resolution Caching
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;
    }